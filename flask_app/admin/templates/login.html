<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eafff5;
    font-family:Arial;
}

.login-card{
    width:360px;
    border:none;
    border-radius:20px;
    background:white;
}

.title{
    color:#22b07d;
    font-weight:bold;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.btn-login{
    background:#22b07d;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px;
}

.btn-login:hover{
    background:#1b9469;
    color:white;
}

</style>

</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card login-card shadow-lg p-4">

<div class="text-center mb-4">

<h2 class="title">AXOMED Admin</h2>
<p class="text-muted">Secure Login Panel</p>

</div>

<form method="post">

<div class="mb-3">

<input type="password"
name="password"
class="form-control"
placeholder="Enter Password">

</div>

<button class="btn btn-login w-100">
Login
</button>

</form>

</div>

</body>
</html>
