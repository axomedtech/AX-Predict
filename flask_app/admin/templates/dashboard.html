<!DOCTYPE html>
<html>
<head>
<title>AXOMED Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4fffb;
    font-family:Arial;
}

.navbar{
    background:#22b07d;
}

.card{
    border:none;
    border-radius:20px;
}

.table thead{
    background:#22b07d;
    color:white;
}

.btn-green{
    background:#22b07d;
    color:white;
    border:none;
}

.btn-green:hover{
    background:#1b9469;
    color:white;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark shadow-sm">
<div class="container-fluid px-4">

<span class="navbar-brand fw-bold">
<i class="bi bi-hospital"></i> AXOMED Admin Panel
</span>

<a href="/" class="btn btn-light btn-sm rounded-pill">
Add Patient
</a>

</div>
</nav>

<div class="container py-5">

<div class="card shadow-lg p-4">

<div class="d-flex justify-content-between align-items-center mb-4">
<h3>Patient Records</h3>
</div>

<div class="table-responsive">

<table class="table table-hover align-middle text-center">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Risk</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for p in patients %}

<tr>

<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>

<td>

{% if p[7] == "High" %}
<span class="badge bg-danger">High</span>

{% elif p[7] == "Medium" %}
<span class="badge bg-warning text-dark">Medium</span>

{% else %}
<span class="badge bg-success">Low</span>

{% endif %}

</td>

<td>

<a href="/admin/edit/{{p[0]}}" class="btn btn-sm btn-green">
<i class="bi bi-pencil"></i>
</a>

<button class="btn btn-sm btn-danger"
data-id="{{ p[0] }}"
onclick="setDelete(this.dataset.id)">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>
</div>

<div class="modal fade" id="deleteModal">

<div class="modal-dialog">
<div class="modal-content border-0 rounded-4">

<div class="modal-header">
<h5 class="modal-title">Delete Patient</h5>
</div>

<div class="modal-body">
Are you sure you want to delete this patient?
</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Cancel
</button>

<a id="deleteBtn" class="btn btn-danger">
Delete
</a>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function setDelete(id){

document.getElementById("deleteBtn").href =
"/admin/delete/" + id;

new bootstrap.Modal(
document.getElementById('deleteModal')
).show();

}

</script>

</body>
</html>
