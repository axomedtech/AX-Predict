<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body { background:#eef2f7; }
.card { border-radius:12px; }
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">
<span class="navbar-brand">🏥 AXOMED Dashboard</span>
<a href="/" class="btn btn-outline-light btn-sm">Add Patient</a>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow p-3">

<h4 class="mb-3">Patient Records</h4>

<table class="table table-hover align-middle text-center">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>

<tbody>
{% for p in patients %}
<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>

<td>
{% if p[7] == "High" %}
<span class="badge bg-danger">High</span>
{% elif p[7] == "Medium" %}
<span class="badge bg-warning text-dark">Medium</span>
{% else %}
<span class="badge bg-success">Low</span>
{% endif %}
</td>

<td>
<a href="/admin/edit/{{p[0]}}" class="btn btn-sm btn-primary">
<i class="bi bi-pencil"></i>
</a>

<button class="btn btn-sm btn-danger" data-id="{{ p[0] }}" onclick="setDelete(this.dataset.id)">
<i class="bi bi-trash"></i>
</button>
</td>

</tr>
{% endfor %}
</tbody>

</table>

</div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Confirm Delete</h5>
</div>

<div class="modal-body">
Are you sure you want to delete this patient?
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<a id="deleteBtn" class="btn btn-danger">Delete</a>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function setDelete(id){
    document.getElementById("deleteBtn").href = "/admin/delete/" + id;
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
}
</script>

</body>
</html>
