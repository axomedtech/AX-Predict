<!DOCTYPE html>
<html>
<head>
<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4fffb;
    font-family:Arial;
}

/* CARD */
.card{
    border:none;
    border-radius:20px;
}

/* TITLE */
.title{
    color:#22b07d;
    font-weight:bold;
}

/* INPUT */
.form-control{
    border-radius:12px;
    padding:12px;
}

/* PRIMARY BUTTON */
.btn-green{
    background:#22b07d;
    color:white;
    border:none;
    border-radius:12px;
    padding:10px 20px;
}

.btn-green:hover{
    background:#1b9469;
}

/* SECONDARY */
.btn-secondary{
    border-radius:12px;
    padding:10px 20px;
}

/* LABEL */
.label{
    font-weight:600;
    margin-bottom:6px;
    color:#333;
}

/* HEADER BOX */
.header-box{
    text-align:center;
    margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg p-4">

<!-- HEADER -->
<div class="header-box">
    <i class="bi bi-pencil-square fs-2 text-success"></i>
    <h2 class="title mt-2">Edit Patient</h2>
    <small class="text-muted">Update patient details</small>
</div>

<!-- FORM -->
<form method="post" action="/admin/update/{{ patient[0] }}">

<!-- NAME -->
<div class="mb-3">
<label class="label">Patient Name</label>
<input type="text"
name="name"
value="{{ patient[1] }}"
class="form-control"
required>
</div>

<!-- AGE -->
<div class="mb-4">
<label class="label">Age</label>
<input type="number"
name="age"
value="{{ patient[2] }}"
class="form-control"
required>
</div>

<!-- BUTTONS -->
<div class="d-flex justify-content-between">

<button type="submit" class="btn btn-green">
<i class="bi bi-check-circle"></i> Update
</button>

<a href="/admin/dashboard" class="btn btn-secondary">
<i class="bi bi-arrow-left"></i> Back
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
