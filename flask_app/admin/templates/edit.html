<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h3>✏️ Edit Patient</h3>

        <form method="post" action="/admin/update/{{patient[0]}}">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" value="{{patient[1]}}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number" name="age" value="{{patient[2]}}" class="form-control">
            </div>

            <button class="btn btn-success">Update</button>
            <a href="/admin/dashboard" class="btn btn-secondary">Back</a>

        </form>
    </div>

</div>

</body>
</html>
