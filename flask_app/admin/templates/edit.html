<!DOCTYPE html>
<html>
<head>
<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4fffb;
    font-family:Arial;
}

.card{
    border:none;
    border-radius:20px;
}

.title{
    color:#22b07d;
    font-weight:bold;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.btn-green{
    background:#22b07d;
    color:white;
    border:none;
    border-radius:12px;
}

.btn-green:hover{
    background:#1b9469;
    color:white;
}

</style>
</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">
<div class="col-lg-6">

<div class="card shadow-lg p-4">

<h2 class="title mb-4">Edit Patient</h2>

<form method="post" action="/admin/update/{{patient[0]}}">

<div class="mb-3">
<label class="mb-2">Patient Name</label>

<input type="text"
name="name"
value="{{patient[1]}}"
class="form-control">
</div>

<div class="mb-4">

<label class="mb-2">Age</label>

<input type="number"
name="age"
value="{{patient[2]}}"
class="form-control">

</div>

<button class="btn btn-green px-4">
Update
</button>

<a href="/admin/dashboard" class="btn btn-secondary px-4">
Back
</a>

</form>

</div>
</div>
</div>
</div>

</body>
</html>
