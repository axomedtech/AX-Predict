<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f4fffb;
    font-family:Arial;
}

/* CARD */
.card{
    border:none;
    border-radius:20px;
}

/* TITLE */
.title{
    color:#22b07d;
    font-weight:bold;
}

/* BACK BUTTON */
.btn-back{
    background:#22b07d;
    color:white;
    border:none;
    border-radius:12px;
    padding:10px 25px;
}

.btn-back:hover{
    background:#1b9469;
}

/* ANALYSIS BOX */
.analysis-box{
    background:#eefaf5;
    border-radius:15px;
    padding:20px;
    margin-top:25px;
    text-align:left;
    border-left:5px solid #22b07d;
}

/* ANALYSIS TITLE */
.analysis-title{
    color:#22b07d;
    font-weight:bold;
    margin-bottom:10px;
}

/* ICON */
.icon-big{
    font-size:40px;
    color:#22b07d;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg text-center p-5">

<!-- ICON -->
<i class="bi bi-clipboard2-pulse icon-big"></i>

<!-- TITLE -->
<h2 class="title mt-3 mb-4">
Prediction Result
</h2>

<!-- NAME -->
<h4 class="mb-2">
{{ name }}
</h4>

<!-- DISEASE -->
<p class="mt-3 fs-5">
<strong>Disease:</strong> {{ prediction }}
</p>

<!-- RISK BADGE -->
{% if risk == "HIGH" %}

<span class="badge bg-danger fs-6 px-4 py-2">
HIGH RISK
</span>

{% elif risk == "MEDIUM" %}

<span class="badge bg-warning text-dark fs-6 px-4 py-2">
MEDIUM RISK
</span>

{% else %}

<span class="badge bg-success fs-6 px-4 py-2">
LOW RISK
</span>

{% endif %}

<!-- ANALYSIS -->
<div class="analysis-box">

<h5 class="analysis-title">
<i class="bi bi-activity"></i> Health Analysis
</h5>

<p class="mb-0">
{{ analysis }}
</p>

</div>

<!-- BACK BUTTON -->
<div class="mt-4">

<a href="/" class="btn btn-back">
<i class="bi bi-arrow-left"></i> Back
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
