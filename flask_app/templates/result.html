<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4fffb;
    font-family:Arial;
}

.card{
    border:none;
    border-radius:20px;
}

.title{
    color:#22b07d;
    font-weight:bold;
}

.btn-back{
    background:#22b07d;
    color:white;
    border:none;
    border-radius:12px;
    padding:10px 25px;
}

.btn-back:hover{
    background:#1b9469;
    color:white;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">
<div class="col-lg-5">

<div class="card shadow-lg text-center p-5">

<h2 class="title mb-4">Prediction Result</h2>

<h4>{{name}}</h4>

<p class="mt-3 fs-5">
<strong>Disease:</strong> {{prediction}}
</p>

{% if risk == "High" %}
<span class="badge bg-danger fs-6 px-4 py-2">High Risk</span>

{% elif risk == "Medium" %}
<span class="badge bg-warning text-dark fs-6 px-4 py-2">Medium Risk</span>

{% else %}
<span class="badge bg-success fs-6 px-4 py-2">Low Risk</span>

{% endif %}

<div class="mt-4">

<a href="/" class="btn btn-back">
⬅ Back
</a>

</div>

</div>
</div>
</div>

</div>

</body>
</html>
